<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralVideos — TikTok Authorization</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f8f8; color: #1a1a1a; }
        .card { background: #fff; padding: 48px 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 440px; width: 90%; }
        .logo { font-size: 1.3em; font-weight: 700; margin-bottom: 24px; }
        .status { width: 64px; height: 64px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.8em; margin-bottom: 20px; }
        .success { background: #e6f9ea; }
        .error { background: #ffe6e6; }
        h1 { font-size: 1.3em; margin-bottom: 8px; }
        p { color: #666; font-size: 0.95em; line-height: 1.5; }
        .small { font-size: 0.85em; margin-top: 24px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">ViralVideos</div>
        <div class="status success">&#10003;</div>
        <h1>Authorization Complete</h1>
        <p>Your TikTok account has been successfully connected to ViralVideos. You can close this page and return to the app.</p>
        <p class="small">ViralVideos OAuth Callback Endpoint<br>You can revoke access at any time from TikTok Settings &rarr; Security and permissions &rarr; Apps and sessions.</p>
    </div>
</body>
</html>
